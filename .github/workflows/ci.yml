name: Terraform CI

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  terraform:
    name: Terraform Apply Sandbox
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          terraform -chdir=terraform init \
            -backend-config="key=sandbox/${{ github.actor }}/terraform.tfstate"

      - name: Terraform Format Check
        run: terraform -chdir=terraform fmt -check

      - name: Terraform Validate
        run: terraform -chdir=terraform validate

      - name: Terraform Plan
        run: |
          terraform -chdir=terraform plan \
            -var-file="envs/sandbox.tfvars" \
            -var="environment=sandbox-${{ github.actor }}"

      - name: Terraform Apply
        run: |
          terraform -chdir=terraform apply \
            -auto-approve \
            -var-file="envs/sandbox.tfvars" \
            -var="environment=sandbox-${{ github.actor }}"

      - name: Get instance ID
        id: tf_output
        run: |
          INSTANCE_ID=$(terraform -chdir=terraform output -raw instance_id)
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Sync code to EC2
        run: |
          aws ssm send-command \
            --instance-ids ${{ steps.tf_output.outputs.instance_id }} \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":[
              "cd /home/admin && git clone https://github.com/your-org/your-repo.git || (cd your-repo && git pull)"
            ]}'

      - name: Start Python process
        run: |
          BUCKET_NAME=$(terraform -chdir=terraform output -raw bucket_name)
          aws ssm send-command \
            --instance-ids ${{ steps.tf_output.outputs.instance_id }} \
            --document-name "AWS-RunShellScript" \
            --parameters "{\"commands\":[
              \"pkill -f script.py || true\",
              \"cd /home/admin/iac_cicd_de && ENVIRONMENT=${{ vars.ENVIRONMENT }} BUCKET_NAME=$BUCKET_NAME nohup python3 script.py > /home/admin/script.log 2>&1 &\"
            ]}"
