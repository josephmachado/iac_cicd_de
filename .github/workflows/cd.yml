name: Terraform CD

on:
  push:
    branches:
      - main

jobs:
  deploy-dev:
    name: Deploy Dev
    runs-on: ubuntu-latest
    environment: dev

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          terraform -chdir=terraform init \
            -backend-config="key=dev/terraform.tfstate"

      - name: Terraform Apply
        run: |
          terraform -chdir=terraform apply \
            -auto-approve \
            -var-file="envs/dev.tfvars"

      - name: Get instance ID
        id: tf_output
        run: |
          INSTANCE_ID=$(terraform -chdir=terraform output -raw instance_id)
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Sync code to EC2
        run: |
          aws ssm send-command \
            --instance-ids ${{ steps.tf_output.outputs.instance_id }} \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":[
              "cd /home/admin && git clone https://github.com/josephmachado/iac_cicd_de.git || (cd iac_cicd_de && git pull)"
            ]}'

      - name: Start Python process
        run: |
          BUCKET_NAME=$(terraform -chdir=terraform output -raw bucket_name)
          aws ssm send-command \
            --instance-ids ${{ steps.tf_output.outputs.instance_id }} \
            --document-name "AWS-RunShellScript" \
            --parameters "{\"commands\":[
              \"pkill -f src/main.py || true\",
              \"cd /home/admin/iac_cicd_de && ENVIRONMENT=${{ vars.ENVIRONMENT }} BUCKET_NAME=$BUCKET_NAME nohup python3 src/main.py > /home/admin/script.log 2>&1 &\"
            ]}"

  automated-checks:
    name: Automated Checks
    runs-on: ubuntu-latest
    needs: deploy-dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint
        run: echo "lint checks — replace with real linter later"

      - name: Unit Tests
        run: echo "unit tests — replace with pytest or similar later"

      - name: Integration Tests
        run: echo "integration tests — replace with real tests later"

  deploy-prod:
    name: Deploy Prod
    runs-on: ubuntu-latest
    needs: automated-checks
    environment: prod

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          terraform -chdir=terraform init \
            -backend-config="key=prod/terraform.tfstate"

      - name: Terraform Apply
        run: |
          terraform -chdir=terraform apply \
            -auto-approve \
            -var-file="envs/prod.tfvars"

      - name: Get instance ID
        id: tf_output
        run: |
          INSTANCE_ID=$(terraform -chdir=terraform output -raw instance_id)
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Sync code to EC2
        run: |
          aws ssm send-command \
            --instance-ids ${{ steps.tf_output.outputs.instance_id }} \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":[
              "cd /home/admin && git clone https://github.com/josephmachado/iac_cicd_de.git || (cd iac_cicd_de && git pull)"
            ]}'

      - name: Start Python process
        run: |
          BUCKET_NAME=$(terraform -chdir=terraform output -raw bucket_name)
          aws ssm send-command \
            --instance-ids ${{ steps.tf_output.outputs.instance_id }} \
            --document-name "AWS-RunShellScript" \
            --parameters "{\"commands\":[
              \"pkill -f src/main.py || true\",
              \"cd /home/admin/iac_cicd_de && ENVIRONMENT=${{ vars.ENVIRONMENT }} BUCKET_NAME=$BUCKET_NAME nohup python3 src/main.py > /home/admin/script.log 2>&1 &\"
            ]}"
